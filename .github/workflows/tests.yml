name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: System deps for scientific wheels
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run pytest
        env:
          # Tests should not call live brokers; set dummy keys so any
          # accidental import-time env reads don't fail.
          ALPACA_API_KEY: dummy
          ALPACA_SECRET_KEY: dummy
          ENABLE_MOCK_DATA: "True"
          ANTHROPIC_API_KEY: dummy
        run: |
          pytest -q --maxfail=5 --disable-warnings
