name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Python, safety, workflow, and container contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      RUN_NETWORK_TESTS: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install compiled lockfile
        run: |
          python -m pip install --disable-pip-version-check -r requirements.lock
          python -m pip check

      - name: Verify lockfile covers every declared dependency
        run: |
          python - <<'PY'
          from pathlib import Path

          from packaging.requirements import Requirement

          def requirements(path: str) -> set[str]:
              result = set()
              for raw_line in Path(path).read_text(encoding="utf-8").splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith(("#", "-")):
                      continue
                  result.add(Requirement(line).name.lower().replace("_", "-"))
              return result

          declared = requirements("requirements.txt")
          locked = requirements("requirements.lock")
          missing = sorted(declared - locked)
          if missing:
              raise SystemExit(f"requirements.lock is stale; missing: {', '.join(missing)}")
          PY

      - name: Compile and import check
        run: |
          python -m compileall -q main.py main_us.py main_us_v2.py main_us_v3.py src tests
          python -c "import main_us_v3"
          python -c "import main, main_us, main_us_v2"

      - name: Workflow and container contract tests
        run: python -m pytest -q tests/v3_workflow

      - name: Full test suite with broker POST guard
        env:
          PYTHONPATH: tests
        run: python -m pytest -p v3_workflow.no_network_order_post

      - name: Install pinned actionlint
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          mkdir -p "$GOBIN"
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          echo "$GOBIN" >> "$GITHUB_PATH"

      - name: Validate GitHub Actions workflows
        run: actionlint -color

      - name: Build container image
        run: docker build --tag "aegisquant-ci:${GITHUB_SHA}" .

      - name: Validate Compose configuration
        run: docker compose --env-file .env.example --profile manual-shadow config --quiet
