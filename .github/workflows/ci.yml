name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Pytest (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      # Tests must not touch real brokers or LLMs in CI.
      ENABLE_MOCK_DATA: "True"
      OPENAI_API_KEY: "sk-test-ci-not-real"
      ANTHROPIC_API_KEY: "sk-ant-test-ci-not-real"
      ALPACA_API_KEY: "ci-not-real"
      ALPACA_SECRET_KEY: "ci-not-real"
      ALPACA_BASE_URL: "https://paper-api.alpaca.markets"
      AEGISQUANT_CI: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Ruff lint (non-blocking advisory)
        # Style findings should not gate the pipeline yet; this surfaces them
        # in the Actions log without failing the build.
        run: ruff check src tests || true

      - name: Pytest
        run: pytest tests/ -q --maxfail=5 --disable-warnings
