name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # Offline-friendly mode — see .env.example
      ENABLE_MOCK_DATA: "True"
      ENABLE_BROKER_EXECUTION: "False"
      ENABLE_LLM_AGENTS: "False"
      MARKET: "US"
      BROKER: "paper"
      INITIAL_CAPITAL: "100000"
      # Dummy keys so module-level os.getenv() calls do not crash
      ALPACA_API_KEY: "test-alpaca-key"
      ALPACA_SECRET_KEY: "test-alpaca-secret"
      ALPACA_BASE_URL: "https://paper-api.alpaca.markets"
      OPENAI_API_KEY: "test-openai-key"
      ANTHROPIC_API_KEY: "test-anthropic-key"
      NEWSAPI_KEY: "test-newsapi-key"
      AEGIS_API_KEY: "test-aegis-key"
      AEGIS_PASSWORD: ""
      SLACK_WEBHOOK_URL: ""
      REDIS_URL: "redis://localhost:6379/0"
      MAX_DRAWDOWN_THRESHOLD: "0.15"
      MIN_SHARPE_THRESHOLD: "0.0"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify project imports (collection smoke test)
        run: pytest --collect-only -q tests/

      - name: Run full test suite (informational)
        continue-on-error: true
        run: pytest -q --maxfail=10 tests/
