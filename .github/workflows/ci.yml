name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install ruff
        run: pip install --upgrade pip ruff
      - name: Ruff check
        run: ruff check src tests --output-format=github || true
      - name: Ruff format check
        run: ruff format --check src tests || true

  security:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pip-audit
        run: pip install --upgrade pip pip-audit
      - name: Audit requirements
        run: pip-audit -r requirements.txt --strict || true

  smoke:
    name: Import smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install minimal deps
        run: |
          pip install --upgrade pip
          pip install pytest numpy pandas pydantic pyyaml
      - name: Collect tests (syntax check)
        run: python -m pytest tests/ --collect-only -q || true
