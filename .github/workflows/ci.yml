name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke checks (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile-all syntax check (src + root scripts)
        run: |
          python -m compileall -q src
          python -m compileall -q main.py main_us.py main_india.py train_rl.py weekly_review.py

      - name: Pytest collect-only (import sanity)
        env:
          MPLBACKEND: Agg
        run: pytest --collect-only -q || true
