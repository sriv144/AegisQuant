name: AegisQuant US Trading Cycle

on:
  schedule:
    # Every 20 minutes during US market hours Mon-Fri
    # ET (Eastern Time) = UTC-4 (EDT, Mar-Nov) / UTC-5 (EST, Nov-Mar)
    # Market: 9:30 AM - 3:55 PM ET  →  13:30-19:55 UTC (EDT) / 14:30-20:55 UTC (EST)
    # Using EDT times (Mar-Nov). EST months have ~1hr offset but circuit breakers handle it.
    - cron: "30 13 * * 1-5"   # 9:30 AM EDT
    - cron: "50 13 * * 1-5"   # 9:50 AM EDT
    - cron: "10 14 * * 1-5"   # 10:10 AM EDT
    - cron: "30 14 * * 1-5"   # 10:30 AM EDT
    - cron: "50 14 * * 1-5"   # 10:50 AM EDT
    - cron: "10 15 * * 1-5"   # 11:10 AM EDT
    - cron: "30 15 * * 1-5"   # 11:30 AM EDT
    - cron: "50 15 * * 1-5"   # 11:50 AM EDT
    - cron: "10 16 * * 1-5"   # 12:10 PM EDT
    - cron: "30 16 * * 1-5"   # 12:30 PM EDT
    - cron: "50 16 * * 1-5"   # 12:50 PM EDT
    - cron: "10 17 * * 1-5"   # 1:10 PM EDT
    - cron: "30 17 * * 1-5"   # 1:30 PM EDT
    - cron: "50 17 * * 1-5"   # 1:50 PM EDT
    - cron: "10 18 * * 1-5"   # 2:10 PM EDT
    - cron: "30 18 * * 1-5"   # 2:30 PM EDT
    - cron: "50 18 * * 1-5"   # 2:50 PM EDT
    - cron: "10 19 * * 1-5"   # 3:10 PM EDT
    - cron: "30 19 * * 1-5"   # 3:30 PM EDT

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  trade:
    name: US Trading Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      MARKET: US
      BROKER: alpaca
      INITIAL_CAPITAL: "100000"
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      ENABLE_MOCK_DATA: "False"
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "websockets>=13.0"

      - name: Run one trading cycle
        run: python main_us.py --now

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-log-${{ github.run_number }}
          path: logs/
          retention-days: 7
          if-no-files-found: ignore
