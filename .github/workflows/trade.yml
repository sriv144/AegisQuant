name: AegisQuant Daily Trade

on:
  schedule:
    # 9:35 AM Eastern = 13:35 UTC (EST) / 13:35 UTC (EDT offset applied via env below)
    # During EDT (Mar–Nov): ET = UTC-4, so 9:35 AM ET = 13:35 UTC
    # During EST (Nov–Mar): ET = UTC-5, so 9:35 AM ET = 14:35 UTC
    # This cron runs at 13:35 UTC year-round — close enough, within the open market window.
    - cron: '35 13 * * 1-5'

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  trade:
    name: Run RL Trading Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AegisQuant trading cycle
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ENABLE_BROKER_EXECUTION: ${{ secrets.ENABLE_BROKER_EXECUTION }}
          ENABLE_MOCK_DATA: "False"
          MAX_DRAWDOWN_THRESHOLD: "0.15"
          MIN_SHARPE_THRESHOLD: "0.0"
        run: python main.py --now

      - name: Upload decision log (SQLite DB)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegisquant-db-${{ github.run_number }}
          path: aegisquant_live.db
          retention-days: 30
          if-no-files-found: ignore
