name: AegisQuant Daily Trade

on:
  schedule:
    # US Pipeline (DISABLED for now — Option C)
    # - cron: '35 13 * * 1-5'   # 9:35 AM ET = 13:35 UTC

    # India Pipeline: 9:15 AM IST = 03:45 UTC (daily Mon-Fri)
    - cron: '45 3 * * 1-5'

  # Allow manual trigger from GitHub Actions UI for testing
  workflow_dispatch:

jobs:
  india-trade:
    name: India NSE Trading Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AegisQuant India trading cycle
        env:
          ANGELONE_API_KEY: ${{ secrets.ANGELONE_API_KEY }}
          ANGELONE_CLIENT_ID: ${{ secrets.ANGELONE_CLIENT_ID }}
          ANGELONE_PASSWORD: ${{ secrets.ANGELONE_PASSWORD }}
          ANGELONE_TOTP_KEY: ${{ secrets.ANGELONE_TOTP_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          ENABLE_BROKER_EXECUTION: ${{ secrets.ENABLE_BROKER_EXECUTION }}
          ENABLE_MOCK_DATA: "False"
          MAX_DRAWDOWN_THRESHOLD: "0.15"
          MIN_SHARPE_THRESHOLD: "0.0"
        run: python main_india.py --now

      - name: Upload decision log (SQLite DB)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegisquant-india-db-${{ github.run_number }}
          path: aegisquant_live.db
          retention-days: 30
          if-no-files-found: ignore
