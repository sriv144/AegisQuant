name: AegisQuant US Trading Cycle

on:
  # PRIMARY TRIGGER: cron-job.org calls this via GitHub API every 20 min
  # POST https://api.github.com/repos/sriv144/AegisQuant/dispatches
  # body: {"event_type": "trade_cycle"}
  repository_dispatch:
    types: [trade_cycle]

  # BACKUP: GitHub's built-in schedule (unreliable, kept as fallback only)
  schedule:
    - cron: "*/30 13-19 * * 1-5"   # every 30 min, 13-19 UTC (rough US hours)

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  trade:
    name: US Trading Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      MARKET: US
      BROKER: alpaca
      INITIAL_CAPITAL: "100000"
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      ENABLE_MOCK_DATA: "False"
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "websockets>=13.0"

      - name: Run one trading cycle
        run: python main_us.py --now

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trade-log-${{ github.run_number }}
          path: logs/
          retention-days: 7
          if-no-files-found: ignore
