version: "3.9"

services:
  trader:
    build: .
    container_name: aegisquant-trader
    command: python main_us.py
    env_file: .env
    volumes:
      - ./aegisquant_live.db:/app/aegisquant_live.db
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  dashboard:
    build: .
    container_name: aegisquant-dashboard
    command: python -m src.webapp.server --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./aegisquant_live.db:/app/aegisquant_live.db
    depends_on:
      - trader
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
